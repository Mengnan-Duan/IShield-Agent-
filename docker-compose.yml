services:
  ishield:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ishield-agent-security
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - API_PROVIDER=deepseek
      - API_BASE_URL=https://api.deepseek.com/v1
      - API_KEY=${DEEPSEEK_API_KEY}
      - API_MODEL=deepseek-chat
      - SANDBOX_MODE=mock
      - SANDBOX_ROOT=/app/backend/sandbox_files
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/sandbox_files:/app/backend/sandbox_files
      - ./backend/policies:/app/backend/policies
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:5000/api/health', timeout=5); exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
