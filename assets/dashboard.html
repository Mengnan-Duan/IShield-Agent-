          <div class="px-5 py-12 text-center">
            <div class="inline-flex flex-col items-center gap-2">
              <svg class="w-8 h-8 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="1.5"/></svg>
              <div class="text-xs text-slate-600 font-mono">// AWAITING_EVENTS</div>

      <!-- Threat Level Gauge -->
      <div class="chart-card">

            <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke-width="1.5" stroke-linecap="round"/></svg>

            <span class="text-sm font-medium text-white">分类防御效果</span>

      <!-- Top attacked tools -->
      <div class="chart-card">
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-white/[0.04]">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke-width="1.5"/></svg>

  <footer class="border-t border-white/[0.04] mt-4">

      <span>IShield Security Operations Center</span>

<script>
"use strict";

const API = "http://localhost:5000/api";

// ── Clock ──
function tick() {
  const n = new Date();
  const el = document.getElementById('clock');
  if (el) el.textContent = [n.getHours(),n.getMinutes(),n.getSeconds()].map(v => String(v).padStart(2,'0')).join(':');
}
setInterval(tick, 1000);
tick();

// ── ECharts theme ──
const CHART_DARK = {
  backgroundColor: 'transparent',
  textStyle: { color: '#64748b', fontFamily: 'JetBrains Mono, monospace' },
};

// ── Init charts ──
const pieChart = echarts.init(document.getElementById('pieChart'));
const trendChart = echarts.init(document.getElementById('trendChart'));
const barChart = echarts.init(document.getElementById('barChart'));
const gaugeChart = echarts.init(document.getElementById('gaugeChart'));
const categoryChart = echarts.init(document.getElementById('categoryChart'));
const toolChart = echarts.init(document.getElementById('toolChart'));

const chartInstances = [pieChart, trendChart, barChart, gaugeChart, categoryChart, toolChart];
window.addEventListener('resize', () => chartInstances.forEach(c => c.resize()));

// ── KPI counters ──
function animateKPI(id, target, suffix) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = parseInt(el.textContent.replace(/[^0-9]/g,'')) || 0;
  const end = typeof target === 'number' ? target : parseInt(target) || 0;
  if (start === end) return;
  const duration = 800;
  const startTime = performance.now();
  function step(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(start + (end - start) * ease) + (suffix || '');
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── Load all data ──
const MAX_LIVE = 50;

async function loadAll() {
  try {
    const [statsRes, analyticsRes, eventsRes] = await Promise.all([
      fetch(API+'/stats'),
      fetch(API+'/analytics?days=7'),
      fetch(API+'/events?limit=100')
    ]);

    const stats = await statsRes.json();
    const analytics = await analyticsRes.json();
    const data = await eventsRes.json();
    const events = data.events || [];

    // ── KPI cards ──
    const total = stats.total || 0;
    const blocked = stats.blocked || 0;
    const rate = stats.block_rate || 0;

    animateKPI('kpi-total', total);
    animateKPI('kpi-blocked', blocked);
    animateKPI('kpi-rate', Math.round(rate), '%');
    document.getElementById('kpi-rate-bar').style.width = rate + '%';

    const todayStats = analytics.today_stats || {};
    animateKPI('kpi-today', todayStats.total || 0);
    animateKPI('kpi-blocked-today', todayStats.blocked || 0);

    const highCount = events.filter(e => e.threat_level === 'high').length;
    animateKPI('kpi-high', highCount);

    // ── Pie chart ──
    const typeMap = {};
    events.forEach(e => { const t = e.type || '未知'; typeMap[t] = (typeMap[t] || 0) + 1; });
    const pieData = Object.entries(typeMap).map(([name, value]) => ({ name, value }));
    if (pieData.length === 0) pieData.push({ name: '暂无数据', value: 1 });
    pieChart.setOption({
      ...CHART_DARK,
      tooltip: { trigger: 'item', backgroundColor: '#1e293b', borderColor: 'rgba(255,255,255,0.08)', textStyle: { color: '#94a3b8' } },
      legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { color: '#64748b', fontSize: 11 }, itemWidth: 10, itemHeight: 10 },
      series: [{
        type: 'pie', radius: ['45%', '72%'], center: ['38%', '50%'],
        avoidLabelOverlap: true,
        itemStyle: { borderRadius: 6, borderColor: '#0f172a', borderWidth: 2 },
        label: { show: false },
        emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold', color: '#fff' } },
        data: pieData.map((d, i) => ({ ...d, itemStyle: { color: ['#ef4444','#f59e0b','#3b82f6','#10b981','#8b5cf6','#ec4899','#14b8a6','#f97316'][i % 8] } }))
      }]
    });

    // ── Trend chart ──
    const trend = analytics.trend || [];
    const days = trend.map(d => d.date ? d.date.substring(5) : '');
    const blockedTrend = trend.map(d => d.blocked || 0);
    const passedTrend = trend.map(d => (d.total || 0) - (d.blocked || 0));
    trendChart.setOption({
      ...CHART_DARK,
      tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: 'rgba(255,255,255,0.08)', textStyle: { color: '#94a3b8' }, axisPointer: { type: 'cross', crossStyle: { color: '#334155' } },
      legend: { show: false },
      grid: { top: 20, right: 20, bottom: 30, left: 50 },
      xAxis: { type: 'category', data: days, axisLine: { lineStyle: { color: '#1e293b' } }, axisTick: { show: false }, axisLabel: { color: '#475569', fontSize: 10 } },
      yAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.04)' } }, axisLabel: { color: '#475569', fontSize: 10 } },
      series: [
        { name: '拦截', type: 'line', smooth: true, data: blockedTrend, lineStyle: { color: '#ef4444', width: 2 }, itemStyle: { color: '#ef4444' }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(239,68,68,0.25)' }, { offset: 1, color: 'rgba(239,68,68,0)' }] } } },
        { name: '通过', type: 'line', smooth: true, data: passedTrend, lineStyle: { color: '#10b981', width: 2 }, itemStyle: { color: '#10b981' } }
      ]
    });

    // ── Bar chart ──
    const sortedTypes = Object.entries(typeMap).sort((a,b) => b[1]-a[1]).slice(0,5);
    barChart.setOption({
      ...CHART_DARK,
      tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: 'rgba(255,255,255,0.08)', textStyle: { color: '#94a3b8' }, axisPointer: { type: 'shadow' } },
      grid: { top: 10, right: 20, bottom: 10, left: 10 },
      xAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.04)' } }, axisLabel: { color: '#475569', fontSize: 10 } },
      yAxis: { type: 'category', data: sortedTypes.map(t => t[0]).reverse(), axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: '#64748b', fontSize: 11 } },
      series: [{
        type: 'bar', data: sortedTypes.map(t => t[1]).reverse(),
        itemStyle: { borderRadius: [0, 4, 4, 0], color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [{ offset: 0, color: '#3b82f6' }, { offset: 1, color: '#60a5fa' }]) },
        barWidth: 14, label: { show: true, position: 'right', color: '#64748b', fontSize: 11 }
      }]
    });

    // ── Gauge ──
    const highEvents = events.filter(e => e.threat_level === 'high').length;
    const mediumEvents = events.filter(e => e.threat_level === 'medium').length;
    const threatScore = total > 0 ? Math.min(100, Math.round(((highEvents * 2 + mediumEvents) / Math.max(total, 1)) * 100)) : 0;
    gaugeChart.setOption({
      ...CHART_DARK,
      series: [{
        type: 'gauge', center: ['50%', '60%'], radius: '90%', startAngle: 200, endAngle: -20, min: 0, max: 100, splitNumber: 5,
        axisLine: { lineStyle: { width: 14, color: [[0.3, '#10b981'],[0.7, '#f59e0b'],[1, '#ef4444']] } },
        pointer: { icon: 'path://M12.8,0.7l12,40.1H0.7L12.8,0.7z', length: '60%', width: 6, offsetCenter: [0, '-10%'], itemStyle: { color: '#94a3b8' } },
        axisTick: { distance: -16, length: 4, lineStyle: { color: '#1e293b', width: 1 } },
        splitLine: { distance: -20, length: 10, lineStyle: { color: '#1e293b', width: 1.5 } },
        axisLabel: { color: '#475569', fontSize: 9, distance: -30 },
        detail: {
          valueAnimation: true,
          formatter: function(value) { return value < 30 ? '{a|安全}' : value < 70 ? '{b|警戒}' : '{c|危险}'; },
          rich: { a: { color: '#10b981', fontSize: 14, fontWeight: 'bold' }, b: { color: '#f59e0b', fontSize: 14, fontWeight: 'bold' }, c: { color: '#ef4444', fontSize: 14, fontWeight: 'bold' } },
          offsetCenter: [0, '40%']
        },
        data: [{ value: threatScore }]
      }]
    });

    // ── Category chart ──
    const catMap = {};
    events.forEach(e => { const cat = e.category || e.type || '其他'; if (!catMap[cat]) catMap[cat] = { total: 0, blocked: 0 }; catMap[cat].total++; if (/已拦截|已阻断/.test(e.status)) catMap[cat].blocked++; });
    const catEntries = Object.entries(catMap).slice(0, 6);
    categoryChart.setOption({
      ...CHART_DARK,
      tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: 'rgba(255,255,255,0.08)', textStyle: { color: '#94a3b8' }, axisPointer: { type: 'shadow' } },
      grid: { top: 5, right: 60, bottom: 5, left: 10 },
      xAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.04)' } }, axisLabel: { color: '#475569', fontSize: 9 } },
      yAxis: { type: 'category', data: catEntries.map(c => c[0]), axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: '#64748b', fontSize: 10 } },
      series: [
        { name: '已拦截', type: 'bar', stack: 'total', data: catEntries.map(c => c[1].blocked), itemStyle: { color: '#ef4444', borderRadius: c => c.dataIndex === catEntries.length - 1 ? [4,4,0,0] : 0 }, barWidth: 10 },
        { name: '已放行', type: 'bar', stack: 'total', data: catEntries.map(c => c[1].total - c[1].blocked), itemStyle: { color: '#10b981', borderRadius: c => c.dataIndex === catEntries.length - 1 ? [0,4,4,0] : 0 }, barWidth: 10 }
      ]
    });

    // ── Tool chart ──
    const toolMap = {};
    events.forEach(e => { const match = e.detail ? e.detail.match(/工具=([^,，]+)/) : null; const tool = match ? match[1] : '未知工具'; if (!toolMap[tool]) toolMap[tool] = { total: 0, blocked: 0 }; toolMap[tool].total++; if (/已拦截|已阻断/.test(e.status)) toolMap[tool].blocked++; });
    const topTools = Object.entries(toolMap).sort((a,b) => b[1].total - a[1].total).slice(0, 5);
    toolChart.setOption({
      ...CHART_DARK,
      tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: 'rgba(255,255,255,0.08)', textStyle: { color: '#94a3b8' }, axisPointer: { type: 'shadow' } },
      grid: { top: 10, right: 20, bottom: 10, left: 90 },
      xAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.04)' } }, axisLabel: { color: '#475569', fontSize: 10 } },
      yAxis: { type: 'category', data: topTools.map(t => t[0]), axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: '#64748b', fontSize: 10, fontFamily: 'JetBrains Mono, monospace' } },
      series: [{ type: 'bar', data: topTools.map(t => ({ value: t[1].blocked, itemStyle: { color: '#ef4444', borderRadius: [0, 4, 4, 0] } })), barWidth: 12, label: { show: true, position: 'right', color: '#64748b', fontSize: 10 } }]
    });

    // ── Live feed ──
    const newEvents = events.filter(e => /已拦截|已阻断/.test(e.status)).slice(0, MAX_LIVE);
    const feed = document.getElementById('liveFeed');
    const countEl = document.getElementById('live-count');
    if (countEl) countEl.textContent = newEvents.length + ' 条记录';

    if (newEvents.length === 0) {
      feed.innerHTML = '<div class="px-5 py-12 text-center"><div class="inline-flex flex-col items-center gap-2"><svg class="w-8 h-8 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="1.5"/></svg><div class="text-xs text-slate-600 font-mono">// ALL_CLEAR — 系统安全</div></div></div>';
      return;
    }

    feed.innerHTML = newEvents.map((ev, i) => {
      const time = ev.time ? ev.time.substring(11, 19) : '--:--:--';
      const level = ev.threat_level || 'medium';
      const levelColor = level === 'high' ? '#ef4444' : level === 'medium' ? '#f59e0b' : '#3b82f6';
      const levelBg = level === 'high' ? 'rgba(239,68,68,0.08)' : level === 'medium' ? 'rgba(245,158,11,0.08)' : 'rgba(59,130,246,0.08)';
      const levelBorder = level === 'high' ? 'rgba(239,68,68,0.15)' : level === 'medium' ? 'rgba(245,158,11,0.15)' : 'rgba(59,130,246,0.15)';
      return `<div class="flex items-center gap-3 px-5 py-3 hover:bg-white/[0.02] transition-colors fade-in" style="animation-delay:${i*30}ms">
        <div class="w-2 h-2 rounded-full flex-shrink-0" style="background:${levelColor};box-shadow:0 0 6px ${levelColor}50"></div>
        <div class="flex-shrink-0 text-xs font-mono text-slate-600 w-20">${time}</div>
        <div class="flex-1 min-w-0"><div class="text-xs font-mono text-slate-300 truncate">${ev.detail || ev.type || '未知事件'}</div></div>
        <div class="flex-shrink-0">
          <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-mono font-medium border" style="color:${levelColor};background:${levelBg};border-color:${levelBorder}">${level === 'high' ? '高危' : level === 'medium' ? '中危' : '低危'}</span>
        </div>
        <div class="flex-shrink-0 text-xs font-mono text-red-500 font-medium">${ev.confidence ? ev.confidence + '%' : '已拦截'}</div>
      </div>`;
    }).join('');

  } catch(e) { console.warn('Dashboard data fetch failed:', e.message); }
}

// ── SSE real-time updates ──
let evtSource = null;
function connectSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource(API + '/events/stream');
  evtSource.addEventListener('message', function(e) { try { const data = JSON.parse(e.data); if (data && data.type === 'alert') loadAll(); } catch(ex) {} });
  evtSource.addEventListener('error', function() {
    const connEl = document.getElementById('connStatus');
    if (connEl) { connEl.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full bg-amber-500/10 border border-amber-500/20'; connEl.innerHTML = '<div class="w-2 h-2 rounded-full bg-amber-500 live-dot"></div><span class="text-xs font-medium text-amber-400 font-mono">RECONNECTING</span>'; }
    setTimeout(connectSSE, 5000);
  });
  evtSource.addEventListener('open', function() {
    const connEl = document.getElementById('connStatus');
    if (connEl) { connEl.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full bg-green-500/10 border border-green-500/20'; connEl.innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500 live-dot"></div><span class="text-xs font-medium text-green-400 font-mono">LIVE</span>'; }
  });
}

// ── Init ──
loadAll();
connectSSE();
setInterval(loadAll, 10000);
</script>
